<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랜덤런 버프 도감</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Malgun Gothic', sans-serif; padding: 20px; text-align: center; }
        h1 { color: #ffd700; text-shadow: 2px 2px 4px #000; margin-bottom: 30px; }
        
        .section-title { 
            text-align: left; margin: 40px auto 10px; max-width: 1600px; 
            padding-left: 10px; border-left: 5px solid #ffd700; font-size: 1.5rem; color: #fff;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1600px; margin: 0 auto 50px; 
        }

        .card { 
            background: #2c2c2c; border: 3px solid #444; border-radius: 15px; 
            padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }

        /* 등급별 테두리 색상 */
        .로얄-레전드 { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.6); background: linear-gradient(145deg, #2c2c2c, #3d3515); } 
        .레전드 { border-color: #00FFCA; }
        .에픽 { border-color: #a29bfe; }
        .레어 { border-color: #74b9ff; }
        .고통 { border-color: #95a5a6; }
        .죽음 { border-color: #ffffff; }
        .지옥 { border-color: #e74c3c; }

        img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; background: #111; min-height: 200px; }
        .name { color: #ffd700; font-weight: bold; font-size: 1.2rem; margin-bottom: 12px; }
        .effect { font-size: 0.9rem; color: #ddd; line-height: 1.6; text-align: left; word-break: keep-all; }
    </style>
</head>
<body>
    <h1>📜 랜덤런 버프/디버프 전체 도감</h1>
    <div id="container"></div>

    <script>
        const cards = [
            { id: 1, grade: "레전드", name: "매화의 축복", effect: "선달로 매화단청 쿠키를 확정으로 씁니다. 원치 않을 경우, 쿠키 리롤 15개로 교환이 가능합니다." },
            { id: 2, grade: "레전드", name: "점수가 더블!", effect: "이번 판 총 점수가 2배 증폭됩니다." },
            { id: 3, grade: "에픽", name: "약한 친구들도 모이면 강해지지!", effect: "C~A 등급 쿠키/ 펫이 나올 때마다 쿠키 리롤을 2개 추가합니다." },
            { id: 4, grade: "에픽", name: "어떤 펫이 나올까?", effect: "자신이 원하는 펫을 미리 선택할 수 있고, 쿠키 리롤을 4개 추가 획득합니다." },
            { id: 5, grade: "에픽", name: "이제 우리에게 맡겨!", effect: "불꽃정령 쿠키, 망개떡맛 쿠키, 충무김밥맛 쿠키 중 하나를 이어달리기에서 달릴 수 있습니다." },
            { id: 6, grade: "에픽", name: "물질 만능 주의", effect: "이번 판에 획득한 코인의 4000배를 점수로 획득합니다." },

            { id: 9, grade: "레어", name: "초록 바람의 스침", effect: "선/이달 쿠키 상관 없이 초록색 계열 쿠키들을 고른다면 이번 판의 점수가 1.3배 증폭됩니다. 애매할 경우 시청자들의 판정을 받습니다." },
            { id: 10, grade: "레어", name: "쫄?", effect: "이번 판에 보물로 통조림 세 개, 기본 이속 17% 부스트를 끼면 다음 판의 점수가 1.4배 증폭됩니다." },
            { id: 11, grade: "레어", name: "인생은 도박", effect: "사다리타기를 해서 성공 시 쿠키 리롤 10개를 얻지만, 실패하면 쿠키 리롤 5개가 차감됩니다. 단, 현재 보유하고 있는 쿠키 리롤이 다섯 개보다 적다면 도전 불가입니다." },
            { id: 12, grade: "레어", name: "구름을 타는 기분", effect: "이번 판에 보너스타임을 들어간 만큼 2000만 점이 추가됩니다." },
            { id: 13, grade: "고통", name: "웃음벨맛 쿠키", effect: "이번 판에 이어달리기가 예언자맛 쿠키로 고정됩니다." },
            { id: 14, grade: "고통", name: "백성을 위한 의적", effect: "마지막 판에 보물을 크라운, 꼬치, 돌도그를 제외하고 플레이합니다." },
            { id: 15, grade: "고통", name: "뱀파이어맛 쿠키의 야식 시간", effect: "이번 판에 보물을 인삼주, 홍삼주, 떡꼬치, 크레페 중에서만 골라야 합니다." },
            { id: 16, grade: "고통", name: "물약펫 표류기", effect: "이번 판에 물약펫이 나오면 강제 리롤을 합니다." },
            { id: 17, grade: "고통", name: "레전드의 전문", effect: "이번 판에 레전더리 쿠키/펫을 선택 시 리롤이 10개가 차감됩니다." },
            { id: 18, grade: "고통", name: "인생은 매콤하게!", effect: "이번 판에 무조건 열 대를 충돌해야 합니다." },
            { id: 19, grade: "고통", name: "뉴비는 빠져!", effect: "2024~2026년에 출시한 쿠키들이 나오면 강제 리롤합니다." },
            { id: 20, grade: "고통", name: "해적의 약탈", effect: "쿠키 리롤 5개 또는 버프 리롤 2개를 차감합니다." },
            { id: 21, grade: "죽음", name: "교통사고", effect: "이번 판에 이어달리기를 사용하지 못합니다." },
            { id: 22, grade: "죽음", name: "먼저 퇴근합니다!", effect: "모든 보유효과와 보물을 해제한 상태로 달립니다." },
            { id: 23, grade: "로얄-레전드", name: "달과 바다의 조화", effect: "조합 자유 선택이 가능하고, 이번 판 총 점수가 1.5배 증폭됩니다." },
            { id: 24, grade: "지옥", name: "폴터가이스트", effect: "최종 목표 점수를 1.2배 증폭시키고 현재 갖고 있는 쿠키 리롤을 모두 차감합니다." },
            { id: 25, grade: "레어", name: "쟤가 없어져볼게!", effect: "C~B 등급 쿠키/펫이 나오면 리롤을 무료로 돌릴 수 있습니다." },
            { id: 26, grade: "고통", name: "밑 빠진 독에 빠진 저울", effect: "펫이 코인저울로 고정됩니다." },
            { id: 27, grade: "에픽", name: "도플갱어", effect: "쿠키/버프 리롤이 4개씩 추가되며 이번 판을 한 번 리트라이 할 수 있습니다." },
            { id: 28, grade: "레어", name: "천사의 은총", effect: "선이달 교체권 1개와 응원점수 1000만점을 얻습니다." },
            { id: 29, grade: "고통", name: "세금 징수", effect: "현재 총 점수의 10%를 깎습니다." },
            { id: 30, grade: "레어", name: "해적의 인질 협상", effect: "목표 점수가 5000만 점 추가되지만 버프 이미지 쿠키를 이달로 선택 가능합니다." },
            { id: 31, grade: "고통", name: "나는 아픈 건 딱 질색이니까", effect: "보물을 불의 반지, 팬던트, 공주 반지로 제한합니다." },
            { id: 32, grade: "에픽", name: "멋진 한 판이었어!", effect: "순점 2억 돌파 시 쿠키 리롤 일곱 개, 버프 리롤 세 개를 추가로 얻고 5천만 점을 추가로 얻습니다." },
            { id: 33, grade: "레어", name: "산타의 작은 선물", effect: "5221만점이 즉시 추가됩니다." },
            { id: 34, grade: "고통", name: "발렌타인데이", effect: "펫이 초코방울로 고정되거나 보물이 초콜릿 패키지로 고정됩니다." },
            { id: 35, grade: "레전드", name: "상큼한 점수 폭발!", effect: "3억점이 즉시 추가됩니다." },
            { id: 36, grade: "죽음", name: "타락 천사", effect: "자력 보물 금지 및 선달이 악마맛 쿠키로 고정됩니다. 단, 리롤 7개 차감 시 해제 가능." },
            { id: 37, grade: "고통", name: "드라우닝", effect: "펫이 꼬마 유령으로 고정됩니다." },
            { id: 38, grade: "에픽", name: "하늘이 무너져도 솟아날 구멍이 있다", effect: "구출 횟수당 2천만 점이 추가됩니다." },
            { id: 39, grade: "고통", name: "불타오르네", effect: "이번 판에 보물 한 칸을 비운 채로 플레이합니다." },
            { id: 40, grade: "레어", name: "혀니수혀니 팬클럽", effect: "선달 초성 'ㅅ' 또는 'ㅎ' 쿠키 선택 시 점수 1.4배 증폭." },
            { id: 41, grade: "고통", name: "소음공해", effect: "이번 판 쿠키와 펫이 마카롱맛 쿠키와 캐스터네츠로 고정됩니다." },
            { id: 42, grade: "레어", name: "앞만 보고 간다", effect: "장애물에 부딪힐 때마다 팔백만 점이 추가됩니다." },
            { id: 43, grade: "고통", name: "그거그렇케하는것아닌대;", effect: "이번 판에 쿠키 리롤을 무조건 15개 이상 사용해야 합니다." },
            { id: 44, grade: "고통", name: "신분증 위조", effect: "벌금으로 쿠키 리롤 7개를 차감합니다." },
            { id: 45, grade: "레어", name: "유행의 선두자", effect: "선달이 용감한 쿠키로 고정되지만 2억 점을 즉시 획득합니다." },
            { id: 46, grade: "에픽", name: "물물교환", effect: "쿠키 리롤 한 개당 이천만 점으로 교환 가능합니다." },
            { id: 47, grade: "고통", name: "과욕불급(過慾不及)", effect: "쿠키 리롤을 열 개 이상 사용하면 목표점수가 1억 점 늘어납니다." },
            { id: 48, grade: "죽음", name: "장수의 비결", effect: "선달 쿠앤크, 펫 브레인껌, 보물 장갑 3개 고정 및 리롤 5개 차감." },
            { id: 49, grade: "레전드", name: "석유왕", effect: "쿠키 리롤 20개, 버프 리롤 5개를 추가 획득합니다." },
            { id: 50, grade: "레어", name: "미스터리 박스", effect: "획득한 무지개 상자 개수만큼 5000만 점을 획득합니다." },
            { id: 51, grade: "고통", name: "끝 없는 연습", effect: "선달 피겨여왕, 연기책 3개 고정. 보상으로 쿠키리롤 7개 획득." },
            { id: 52, grade: "레어", name: "지치고 병든 나그네여", effect: "리롤 소진 시 리롤 7개 획득 및 이번 판 점수 1.1배 증폭." },
            { id: 53, grade: "고통", name: "쉬고 싶어..", effect: "부활한 횟수만큼 목표 점수가 이천만 점 추가됩니다." },
            { id: 54, grade: "레어", name: "원 플러스 원", effect: "버프 하나 더 추출 가능. 단, 추가 버프는 리롤 불가." },
            { id: 55, grade: "고통", name: "가까이 오지 마", effect: "보물이 이동속도 증가 보물로 제한됩니다." },
            { id: 56, grade: "레어", name: "동에번쩍 서에번쩍", effect: "지옥 한 바퀴당 4000만 점 추가 (최대 2억)." },
            { id: 57, grade: "고통", name: "꽃가루를 날려", effect: "30초 간 눈을 감고 플레이합니다." },
            { id: 58, grade: "에픽", name: "VIP 혜택", effect: "사용한 쿠키 리롤 수만큼 1000만점을 획득합니다." },
            { id: 59, grade: "죽음", name: "뛰어! 누워!", effect: "점프키와 슬라이드키를 바꾸고 쿠키 리롤 3개를 차감합니다." },
            { id: 60, grade: "레어", name: "위치 전환", effect: "선이달 교체권을 1개 얻습니다." },
            { id: 61, grade: "고통", name: "감히 왕족을 능멸하는가!", effect: "펫이 초코왕방울로 고정됩니다." },
            { id: 62, grade: "에픽", name: "차원 이동", effect: "쿠키/버프 리롤 3개 추가 및 원하는 에피소드에서 달리기 가능." }
        ];

        const order = ["로얄-레전드", "레전드", "에픽", "레어", "고통", "죽음", "지옥"];
        const container = document.getElementById('container');

        order.forEach(grade => {
            const filtered = cards.filter(c => c.grade === grade);
            if (filtered.length > 0) {
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = grade.toUpperCase();
                container.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';
                
                filtered.forEach(card => {
                    const div = document.createElement('div');
                    div.className = `card ${card.grade}`;
                    
                    // 가람님 깃허브 특성 반영: .png.png를 먼저 찾고 실패 시 .png 시도
                    div.innerHTML = `
                        <div style="font-size: 0.8rem; margin-bottom: 8px; color: #888;">[${card.grade}]</div>
                        <img src="${card.id}.png.png" onerror="this.src='${card.id}.png';">
                        <div class="name">${card.name}</div> 
                        <div class="effect">${card.effect}</div>
                    `;
                    grid.appendChild(div);
                });
                container.appendChild(grid);
            }
        });
    </script>
</body>
</html>
